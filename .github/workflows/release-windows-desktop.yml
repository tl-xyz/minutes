name: Release Windows Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TAURI_CLI_VERSION: "2.10.1"

jobs:
  windows-desktop:
    name: Build Windows desktop binary
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-desktop-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "${TAURI_CLI_VERSION}" --locked

      - name: Build desktop binary
        working-directory: tauri/src-tauri
        run: cargo tauri build --ci --no-bundle

      - name: Rename desktop binary
        shell: bash
        run: cp -f target/release/minutes-app.exe minutes-desktop-windows-x64.exe

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: minutes-desktop-windows-x64
          path: minutes-desktop-windows-x64.exe
          if-no-files-found: error

      - name: Attach desktop asset on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: minutes-desktop-windows-x64.exe
