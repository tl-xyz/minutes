name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ALSA dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set CXXFLAGS for whisper.cpp (macOS)
        if: runner.os == 'macOS'
        run: echo "CXXFLAGS=-I$(xcrun --show-sdk-path)/usr/include/c++/v1" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build core (no whisper)
        run: cargo build -p minutes-core --no-default-features

      - name: Build full workspace (macOS only)
        if: runner.os == 'macOS'
        run: cargo build --no-default-features

      - name: Test (unit + integration, no whisper)
        run: cargo test -p minutes-core --no-default-features -- --test-threads=1
        timeout-minutes: 5

      - name: Clippy (macOS only — full workspace)
        if: runner.os == 'macOS'
        run: cargo clippy --all --no-default-features -- -D warnings

      - name: Format check (macOS only)
        if: runner.os == 'macOS'
        run: cargo fmt --all -- --check

  mcp:
    name: MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install MCP dependencies
        working-directory: crates/mcp
        run: npm install

      - name: TypeScript check
        working-directory: crates/mcp
        run: npx tsc --noEmit
