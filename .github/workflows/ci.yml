name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ALSA dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set CXXFLAGS for whisper.cpp (macOS)
        if: runner.os == 'macOS'
        run: echo "CXXFLAGS=-I$(xcrun --show-sdk-path)/usr/include/c++/v1" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build core (no whisper)
        run: cargo build -p minutes-core --no-default-features

      - name: Build full workspace (macOS only)
        if: runner.os == 'macOS'
        run: cargo build --no-default-features

      - name: Unit tests (no whisper)
        run: cargo test -p minutes-core --no-default-features --lib -- --test-threads=1
        timeout-minutes: 3

      - name: Integration tests (no whisper, macOS only)
        if: runner.os == 'macOS'
        run: cargo test -p minutes-core --no-default-features --test integration -- --test-threads=1
        timeout-minutes: 10
        continue-on-error: true

      - name: Clippy (macOS only — full workspace)
        if: runner.os == 'macOS'
        run: cargo clippy --all --no-default-features -- -D warnings

      - name: Format check (macOS only)
        if: runner.os == 'macOS'
        run: cargo fmt --all -- --check

  install:
    name: Install CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ALSA dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-install-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo install minutes-cli (no whisper)
        run: cargo install --path crates/cli --no-default-features

      - name: Verify minutes --help
        run: minutes --help

      - name: Verify minutes --version
        run: minutes --version

  desktop_windows:
    name: Desktop App (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-desktop-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "2.10.1" --locked

      - name: Build Windows desktop app (no bundle)
        working-directory: tauri/src-tauri
        run: cargo tauri build --ci --no-bundle

  mcp:
    name: MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install MCP dependencies
        working-directory: crates/mcp
        run: npm install

      - name: TypeScript check
        working-directory: crates/mcp
        run: npx tsc --noEmit
