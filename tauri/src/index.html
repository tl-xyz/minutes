<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minutes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1c1c1e;
      --bg-elevated: #2c2c2e;
      --bg-hover: #38383a;
      --border: #38383a;
      --text: #f5f5f7;
      --text-secondary: #86868b;
      --text-tertiary: #636366;
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --red: #ff453a;
      --red-bg: rgba(255, 69, 58, 0.12);
      --green: #30d158;
      --purple: #bf5af2;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      -webkit-app-region: drag;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .status-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--bg-elevated);
      color: var(--text-tertiary);
      -webkit-app-region: no-drag;
    }

    .status-pill.recording {
      background: var(--red-bg);
      color: var(--red);
    }

    /* ── Recording bar ── */
    .recording-bar {
      display: none;
      padding: 12px 20px;
      background: var(--red-bg);
      border-bottom: 1px solid rgba(255, 69, 58, 0.2);
      animation: recording-pulse 2s ease-in-out infinite;
    }

    .recording-bar.active { display: block; }

    @keyframes recording-pulse {
      0%, 100% { background: var(--red-bg); }
      50% { background: rgba(255, 69, 58, 0.18); }
    }

    .recording-bar .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .recording-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--red);
    }

    .recording-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .recording-time {
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      font-family: 'SF Mono', 'Menlo', monospace;
    }

    /* ── Audio visualizer ── */
    .audio-viz {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 28px;
      margin: 6px 0 8px;
    }

    .audio-viz .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--red);
      opacity: 0.6;
      min-height: 3px;
      transition: height 0.08s ease-out;
    }

    .recording-actions {
      display: flex;
      gap: 8px;
    }

    .recording-actions .btn {
      flex: 1;
    }

    /* ── Quick note inline ── */
    .quick-note {
      display: none;
      padding: 0 20px 12px;
    }

    .quick-note.active { display: block; }

    .quick-note-row {
      display: flex;
      gap: 8px;
    }

    .quick-note-row input {
      flex: 1;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-elevated);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }

    .quick-note-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.12);
    }

    .quick-note-row input::placeholder { color: var(--text-tertiary); }

    /* ── Search ── */
    .search-wrap {
      padding: 0 20px 12px;
    }

    .search-box {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elevated);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }

    .search-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.12);
    }

    .search-box::placeholder { color: var(--text-tertiary); }

    .search-icon {
      position: relative;
    }

    .search-icon::before {
      content: "⌕";
      position: absolute;
      left: 32px;
      top: 9px;
      font-size: 16px;
      color: var(--text-tertiary);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Meeting list ── */
    .meetings-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px;
    }

    .meetings-scroll::-webkit-scrollbar { width: 6px; }
    .meetings-scroll::-webkit-scrollbar-track { background: transparent; }
    .meetings-scroll::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 3px;
    }

    .date-group {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      padding: 12px 0 6px;
    }

    .date-group:first-child { padding-top: 4px; }

    .meeting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .meeting-item:hover { background: var(--bg-hover); }
    .meeting-item:active { background: #48484a; }

    .meeting-info { flex: 1; min-width: 0; }

    .meeting-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meeting-meta {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .meeting-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      flex-shrink: 0;
      margin-left: 8px;
    }

    .meeting-badge.memo {
      background: rgba(191, 90, 242, 0.12);
      color: var(--purple);
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-tertiary);
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
    .empty-state .title { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
    .empty-state .sub { font-size: 12px; margin-top: 4px; }

    /* ── Footer ── */
    .footer {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
    }

    /* ── Buttons ── */
    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      -webkit-app-region: no-drag;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    .btn-danger:hover { background: #ff6961; }

    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--bg-hover); }

    .btn-sm { padding: 5px 12px; font-size: 12px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>Minutes</h1>
    <span class="status-pill" id="status-pill">idle</span>
  </div>

  <!-- Recording bar (hidden when not recording) -->
  <div class="recording-bar" id="recording-bar">
    <div class="top-row">
      <div class="recording-indicator">
        <span class="recording-dot"></span>
        Recording
      </div>
      <span class="recording-time" id="recording-time">0:00</span>
    </div>
    <div class="audio-viz" id="audio-viz"></div>
    <div class="recording-actions">
      <button class="btn btn-secondary btn-sm" id="btn-note-inline" title="Add a note">Add Note</button>
      <button class="btn btn-danger btn-sm" id="btn-stop">Stop Recording</button>
    </div>
  </div>

  <!-- Quick note (shown when "Add Note" clicked during recording) -->
  <div class="quick-note" id="quick-note">
    <div class="quick-note-row">
      <input type="text" id="note-inline-input" placeholder="Quick note..." />
      <button class="btn btn-secondary btn-sm" id="btn-note-save">Save</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap search-icon">
    <input class="search-box" type="text" placeholder="Search meetings and memos..." id="search-input" />
  </div>

  <!-- Meeting list -->
  <div class="meetings-scroll" id="meetings-scroll">
    <div class="empty-state">
      <div class="icon">⏳</div>
      <div class="title">Loading...</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer" id="footer">
    <button class="btn btn-primary" id="btn-record">Start Recording</button>
  </div>

  <!-- Onboarding overlay (shown on first run when no whisper model) -->
  <div class="onboarding" id="onboarding" style="display: none;">
    <div class="onboarding-content">
      <div class="onboarding-icon">🎙</div>
      <h2>Welcome to Minutes</h2>
      <p class="onboarding-sub">Let's get you set up. This takes about 30 seconds.</p>

      <div class="onboarding-steps">
        <div class="onboarding-step" id="step-model">
          <div class="step-header">
            <span class="step-num">1</span>
            <span class="step-title">Download speech model</span>
            <span class="step-status" id="step-model-status"></span>
          </div>
          <div class="step-body" id="step-model-body">
            <p>Choose a model size:</p>
            <div class="model-options">
              <button class="btn btn-secondary btn-sm model-btn" data-model="tiny">Tiny (75 MB, fast)</button>
              <button class="btn btn-primary btn-sm model-btn" data-model="base">Base (141 MB, recommended)</button>
              <button class="btn btn-secondary btn-sm model-btn" data-model="small">Small (466 MB, best accuracy)</button>
            </div>
            <div class="download-progress" id="download-progress" style="display: none;">
              <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
              <span class="progress-text" id="progress-text">Downloading...</span>
            </div>
          </div>
        </div>

        <div class="onboarding-step disabled" id="step-ready">
          <div class="step-header">
            <span class="step-num">2</span>
            <span class="step-title">Ready to go</span>
          </div>
          <div class="step-body">
            <p>Record meetings, take voice memos, and search everything with AI.</p>
            <button class="btn btn-primary" id="btn-finish-setup" disabled>Start Using Minutes</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <style>
    .onboarding {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .onboarding-content {
      max-width: 400px;
      text-align: center;
    }

    .onboarding-icon { font-size: 48px; margin-bottom: 12px; }

    .onboarding-content h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .onboarding-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .onboarding-steps { text-align: left; }

    .onboarding-step {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
    }

    .onboarding-step.disabled { opacity: 0.4; pointer-events: none; }
    .onboarding-step.done { border-color: var(--green); }

    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .onboarding-step.done .step-num {
      background: var(--green);
      color: #000;
    }

    .step-title { font-size: 14px; font-weight: 500; flex: 1; }

    .step-status {
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
    }

    .step-body { padding-left: 32px; }
    .step-body p { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }

    .model-options { display: flex; flex-direction: column; gap: 6px; }
    .model-btn { text-align: left; }

    .download-progress { margin-top: 10px; }

    .progress-bar {
      height: 4px;
      background: var(--bg-elevated);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text { font-size: 11px; color: var(--text-secondary); }
  </style>

  <script>
    const { invoke } = window.__TAURI__.core;

    const statusPill = document.getElementById('status-pill');
    const recordingBar = document.getElementById('recording-bar');
    const recordingTime = document.getElementById('recording-time');
    const quickNote = document.getElementById('quick-note');
    const noteInput = document.getElementById('note-inline-input');
    const footer = document.getElementById('footer');
    const meetingsScroll = document.getElementById('meetings-scroll');
    const searchInput = document.getElementById('search-input');

    let isRecording = false;
    let pollInterval = null;
    const NUM_BARS = 32;
    const audioViz = document.getElementById('audio-viz');

    // Create visualizer bars
    for (let i = 0; i < NUM_BARS; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = '3px';
      audioViz.appendChild(bar);
    }

    // History for smooth animation
    const barHeights = new Array(NUM_BARS).fill(3);

    function updateViz(level) {
      const bars = audioViz.children;
      // Shift bars left, add new value at end
      for (let i = 0; i < NUM_BARS - 1; i++) {
        barHeights[i] = barHeights[i + 1];
      }
      // Map 0-100 to 3-28px with some randomness for natural feel
      const jitter = level > 5 ? (Math.random() - 0.5) * level * 0.3 : 0;
      barHeights[NUM_BARS - 1] = Math.max(3, Math.min(28, (level / 100) * 28 + jitter));

      for (let i = 0; i < NUM_BARS; i++) {
        bars[i].style.height = barHeights[i] + 'px';
        bars[i].style.opacity = barHeights[i] > 4 ? '0.7' : '0.3';
      }
    }

    // ── Status polling ──
    async function checkStatus() {
      try {
        const status = await invoke('cmd_status');
        const wasRecording = isRecording;
        isRecording = status.recording;

        if (isRecording) {
          statusPill.className = 'status-pill recording';
          statusPill.textContent = 'recording';
          recordingBar.classList.add('active');
          footer.style.display = 'none';
          if (status.elapsed) recordingTime.textContent = status.elapsed;
          updateViz(status.audioLevel || 0);

          // Speed up polling when recording starts
          if (!wasRecording) startFastPoll();
        } else {
          statusPill.className = 'status-pill';
          statusPill.textContent = 'idle';
          recordingBar.classList.remove('active');
          quickNote.classList.remove('active');
          footer.style.display = '';

          // Slow down polling when recording stops
          if (wasRecording) {
            stopFastPoll();
            loadMeetings(); // Refresh list
          }
        }
      } catch (e) {
        console.error('Status:', e);
      }
    }

    function startFastPoll() {
      stopFastPoll();
      pollInterval = setInterval(checkStatus, 150);
    }

    function stopFastPoll() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    // ── Recording controls ──
    document.getElementById('btn-record').addEventListener('click', async () => {
      try {
        await invoke('cmd_start_recording');
      } catch (e) {
        console.error('Record:', e);
      }
    });

    document.getElementById('btn-stop').addEventListener('click', async () => {
      try {
        await invoke('cmd_stop_recording');
        // Refresh meetings after processing
        setTimeout(loadMeetings, 3000);
      } catch (e) {
        console.error('Stop:', e);
      }
    });

    // ── Inline note ──
    document.getElementById('btn-note-inline').addEventListener('click', () => {
      quickNote.classList.toggle('active');
      if (quickNote.classList.contains('active')) {
        noteInput.focus();
      }
    });

    async function saveInlineNote() {
      const text = noteInput.value.trim();
      if (!text) return;
      try {
        await invoke('cmd_add_note', { text });
        noteInput.value = '';
        quickNote.classList.remove('active');
      } catch (e) {
        console.error('Note:', e);
      }
    }

    document.getElementById('btn-note-save').addEventListener('click', saveInlineNote);
    noteInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); saveInlineNote(); }
      if (e.key === 'Escape') { quickNote.classList.remove('active'); }
    });

    // ── Meeting list ──
    function groupByDate(meetings) {
      const groups = {};
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      for (const m of meetings) {
        const d = new Date(m.date || m.path);
        let label;
        if (d.toDateString() === today.toDateString()) label = 'Today';
        else if (d.toDateString() === yesterday.toDateString()) label = 'Yesterday';
        else label = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

        if (!groups[label]) groups[label] = [];
        groups[label].push(m);
      }
      return groups;
    }

    function formatTime(dateStr) {
      if (!dateStr) return '';
      try {
        return new Date(dateStr).toLocaleTimeString('en-US', {
          hour: 'numeric', minute: '2-digit'
        });
      } catch { return ''; }
    }

    function renderMeetings(meetings) {
      meetingsScroll.replaceChildren();

      if (!meetings || meetings.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<div class="icon">🎙</div><div class="title">No meetings yet</div><div class="sub">Start a recording or watch ~/.minutes/inbox/ for new audio files</div>';
        meetingsScroll.appendChild(empty);
        return;
      }

      const groups = groupByDate(meetings);
      for (const [label, items] of Object.entries(groups)) {
        const header = document.createElement('div');
        header.className = 'date-group';
        header.textContent = label;
        meetingsScroll.appendChild(header);

        for (const m of items) {
          const item = document.createElement('div');
          item.className = 'meeting-item';
          item.addEventListener('click', () => {
            invoke('cmd_open_file', { path: m.path });
          });

          const info = document.createElement('div');
          info.className = 'meeting-info';

          const title = document.createElement('div');
          title.className = 'meeting-title';
          title.textContent = m.title || 'Untitled';

          const meta = document.createElement('div');
          meta.className = 'meeting-meta';
          meta.textContent = formatTime(m.date);

          info.appendChild(title);
          info.appendChild(meta);

          const badge = document.createElement('span');
          badge.className = 'meeting-badge' + (m.content_type === 'memo' ? ' memo' : '');
          badge.textContent = m.content_type || 'meeting';

          item.appendChild(info);
          item.appendChild(badge);
          meetingsScroll.appendChild(item);
        }
      }
    }

    async function loadMeetings() {
      try {
        const meetings = await invoke('cmd_list_meetings', { limit: 30 });
        renderMeetings(meetings);
      } catch (e) {
        console.error('Load:', e);
        renderMeetings([]);
      }
    }

    // ── Search ──
    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim();
      if (!query) { loadMeetings(); return; }
      searchTimeout = setTimeout(async () => {
        try {
          const results = await invoke('cmd_search', { query });
          renderMeetings(results);
        } catch (e) { console.error('Search:', e); }
      }, 250);
    });

    // ── Onboarding ──
    async function checkSetup() {
      try {
        const setup = await invoke('cmd_needs_setup');
        if (setup.needsSetup) {
          document.getElementById('onboarding').style.display = 'flex';
          setupOnboarding();
        }
      } catch (e) {
        console.error('Setup check:', e);
      }
    }

    function setupOnboarding() {
      document.querySelectorAll('.model-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const model = btn.dataset.model;
          document.querySelectorAll('.model-btn').forEach(b => b.disabled = true);

          const progress = document.getElementById('download-progress');
          const fill = document.getElementById('progress-fill');
          const text = document.getElementById('progress-text');
          progress.style.display = 'block';

          // Animate progress (curl doesn't give us real progress via invoke)
          fill.style.width = '20%';
          text.textContent = `Downloading ${model} model...`;

          const progressTimer = setInterval(() => {
            const current = parseFloat(fill.style.width);
            if (current < 85) fill.style.width = (current + 2) + '%';
          }, 500);

          try {
            const result = await invoke('cmd_download_model', { model });
            clearInterval(progressTimer);
            fill.style.width = '100%';
            text.textContent = result;

            document.getElementById('step-model').classList.add('done');
            document.getElementById('step-model-status').textContent = 'Done';
            document.getElementById('step-model-body').style.display = 'none';

            document.getElementById('step-ready').classList.remove('disabled');
            document.getElementById('btn-finish-setup').disabled = false;
          } catch (e) {
            clearInterval(progressTimer);
            fill.style.width = '0%';
            fill.style.background = 'var(--red)';
            text.textContent = `Error: ${e}`;
            document.querySelectorAll('.model-btn').forEach(b => b.disabled = false);
          }
        });
      });

      document.getElementById('btn-finish-setup').addEventListener('click', () => {
        document.getElementById('onboarding').style.display = 'none';
        loadMeetings();
      });
    }

    // ── Init ──
    checkSetup();
    checkStatus();
    loadMeetings();
    setInterval(() => { if (!pollInterval) checkStatus(); }, 2000);
  </script>
</body>
</html>
